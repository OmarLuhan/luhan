name: Angular 19 CI/CD with Bun

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: 20.13.1  # Versión LTS recomendada para Angular 19
  NG_VERSION: 19         # Versión de Angular
  BUN_VERSION: 1.2.9     # Versión de Bun

jobs:
  build-and-test:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install dependencies with Bun
      run: bun install

    - name: Install Angular CLI
      run: bunx --bun @angular/cli@${{ env.NG_VERSION }} install -g @angular/cli

    - name: Run lint
      run: bunx ng lint

    - name: Build application
      run: bunx ng build --configuration=production

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-test
    runs-on: ubuntu-latest
    
    # Solo ejecutar en pushes a main (no en PRs)
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: dist/luhan # Reemplaza con el nombre de tu app
