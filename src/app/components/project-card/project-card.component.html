<app-card [class]="'overflow-hidden'">
  <div class="relative aspect-video">
    <img
      src="{{ props()?.image }}"
      alt="Project Image"
      class="object-cover transition-transform hover:scale-105"
      style="width: 600px; height: 250px"
    />
  </div>
  <main class="p-4">
    <h3 class="font-semibold text-xl mb-2">{{ props()?.title }}</h3>
    <p class="text-sm text-muted-foreground mb-4">{{ props()?.description }}</p>
    <div class="flex flex-wrap gap-2">
      @for(tag of props()?.tags;track tag){

      <span
        class="inline-flex items-center rounded-md bg-muted px-2 py-1 text-xs font-medium ring-1 ring-inset ring-gray-500/10"
      >
        {{ tag }}
      </span>
      }
    </div>
  </main>
  <footer class="p-4 pt-0">
    <a
      href="{{ props()?.link }}"
      target="_blank"
      class="inline-flex items-center gap-2 text-sm hover:underline"
    >
      <lucide-icon [img]="github" class="h-4 w-4"></lucide-icon>
      View on GitHub
    </a>
  </footer>
</app-card>
