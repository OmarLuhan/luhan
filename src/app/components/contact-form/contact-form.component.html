<app-card class="p-6">
  <form class="space-y-4" (submit)="handleSubmit($event)">
    <div>
      <label htmlFor="name" class="block text-sm font-medium mb-2">
        Name
      </label>
      <input
        id="name"
        name="name"
        class="lex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-foreground focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm"
        required
      />
    </div>
    <div>
      <label htmlFor="email" class="block text-sm font-medium mb-2">
        Email
      </label>
      <Input
        id="email"
        name="email"
        type="email"
        class="lex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-foreground focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm"
        required
      />
    </div>
    <div>
      <label htmlFor="message" class="block text-sm font-medium mb-2">
        Message
      </label>
      <textarea
        class="flex min-h-[80px] w-full rounded-md border border-input bg-background px-3 py-2 text-base ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-foreground focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm"
        id="message"
        name="message"
        required
      ></textarea>
      <button
        type="submit"
        class="w-full h-9 rounded-md px-3 mt-4 bg-foreground text-accent hover:bg-foreground/80"
        disabled="{{ pending() }}"
      >
        @if(pending()) {
        <lucide-icon [img]="loader" class="h-4 w-4 animate-spin"></lucide-icon>
        } @else {
        <span>Send Message</span>
        }
      </button>
      @if(message()){
      <p class="text-sm text-center mt-4 text-muted-foreground">
        {{ message() }}
      </p>
      }
    </div>
  </form>
</app-card>
