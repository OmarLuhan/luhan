<div class="grid gap-6 md:grid-cols-2">
  @for (tech of tecnologies; track $index) {
  <app-card [class]="'py-6'">
    <h3 class="text-lg font-semibold mb-4 ml-7">{{ tech.category }}</h3>
    <div class="flex flex-wrap ml-5">
      @for(skill of tech.skills; track $index) {
      <span
        class="inline-flex items-center ml-2 rounded-md bg-muted px-2 py-1 text-sm font-medium border border-border"
      >
        {{ skill }}
      </span>
      }
    </div>
  </app-card>
  }
</div>
